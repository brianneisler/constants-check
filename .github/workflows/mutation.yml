name: Mutation Testing

# Mutation testing is slower than unit tests, so it runs as a separate,
# non-blocking job rather than inside the main CI matrix. It is report-only
# for now (stryker.config.json sets break: 0): it publishes a score and an
# HTML report artifact but never fails the build. Raise the break threshold
# once a baseline is established.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '__tests__/**'
      - 'stryker.config.json'
      - '.github/workflows/mutation.yml'
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Stryker's --since/incremental support benefits from full history.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation
          if-no-files-found: ignore
